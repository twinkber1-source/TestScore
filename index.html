<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<title>Есеп</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
background:#0f0f0f;
color:white;
overflow:hidden;
}

.container{
text-align:center;
}

.score{
font-size:70px;
margin-bottom:25px;
padding:25px 50px;
background:#161616;
border-radius:18px;
box-shadow:0 0 25px rgba(0,0,0,0.6),
inset 0 0 10px rgba(255,255,255,0.03);
transition:0.25s;
}

.buttons{
display:flex;
gap:20px;
justify-content:center;
}

button{
border:none;
padding:15px 30px;
font-size:22px;
border-radius:12px;
cursor:pointer;
background:#222;
color:white;
transition:0.25s;
}

button:active{
transform:scale(0.9);
}

.plus:hover{
background:#27ae60;
}

.minus:hover{
background:#c0392b;
}

.reset{
position:absolute;
top:20px;
right:20px;
background:#8e0000;
font-size:16px;
padding:10px 16px;
}

.reset:hover{
background:#ff3b3b;
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:flex;
justify-content:center;
align-items:center;
opacity:0;
pointer-events:none;
transition:0.3s;
}

.popup.active{
opacity:1;
pointer-events:auto;
}

.popup-box{
background:#1c1c1c;
padding:30px;
border-radius:16px;
text-align:center;
animation:pop 0.3s;
}

@keyframes pop{
from{transform:scale(0.7);opacity:0;}
to{transform:scale(1);opacity:1;}
}

.confirm{
margin-top:15px;
background:#1e7e34;
position:relative;
overflow:hidden;
}

.confirm.loading{
pointer-events:none;
}

.confirm.loading::after{
content:"";
position:absolute;
left:0;
top:0;
height:100%;
width:0%;
background:#2ecc71;
animation:load 1s forwards;
}

@keyframes load{
from{width:0}
to{width:100%}
}

.cancel{
margin-left:10px;
background:#444;
}

</style>
</head>

<body>

<button class="reset" onclick="askReset()">Нөлдеу</button>

<div class="container">

<div class="score" id="score">0</div>

<div class="buttons">
<button class="minus" onclick="askChange(-1)">-1</button>
<button class="plus" onclick="askChange(1)">+1</button>
</div>

</div>

<div class="popup" id="popup">
<div class="popup-box">

<div id="popupText">Сіз сенімдісіз бе?</div>

<br>

<button class="confirm" id="confirmBtn">Растау</button>
<button class="cancel" onclick="closePopup()">Жоқ</button>

</div>
</div>

<script>

let score = 0
let changeValue = 0

function update(){

let el = document.getElementById("score")

el.style.transform="scale(1.15)"

setTimeout(()=>{
el.style.transform="scale(1)"
},150)

el.innerText = score
}

function askChange(value){
changeValue = value
document.getElementById("popupText").innerText="Өзгертуге сенімдісіз бе?"
openPopup()
}

function askReset(){
changeValue = "reset"
document.getElementById("popupText").innerText="Есепті нөлдейміз бе?"
openPopup()
}

function openPopup(){
document.getElementById("popup").classList.add("active")
}

function closePopup(){
document.getElementById("popup").classList.remove("active")
}

document.getElementById("confirmBtn").onclick=function(){

let btn=this
btn.classList.add("loading")

setTimeout(()=>{

if(changeValue==="reset"){
score=0
}else{
score+=changeValue
}

update()

btn.classList.remove("loading")
closePopup()

},1000)

}

</script>

</body>
</html>
